# docker-compose.yml (fixed)
services:
  ibla_db:
    container_name: ibla_db
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-ibla_db}
      POSTGRES_USER: ${DB_USER:-ibla_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ibla_pass}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    container_name: backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      POSTGRES_HOST: ibla_db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${DB_NAME:-ibla_db}
      POSTGRES_USER: ${DB_USER:-ibla_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ibla_pass}
      DJANGO_SETTINGS_MODULE: backend.settings.prod
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-.env}
    depends_on:
      ibla_db:
        condition: service_healthy
    volumes:
      # يجب أن تكون قابلة للكتابة (بدون :ro) لأن Django سيكتب هنا
      - staticfiles:/app/backend/staticfiles
      - media:/app/backend/media
    expose:
      - "8000"
    command: >
      sh -c "
        mkdir -p /app/backend/media/avatars &&
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        gunicorn backend.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 90
      "

  frontend_builder:
    container_name: frontend_builder
    build:
      context: ./frontend
    command: sh -c "npm ci || npm install && npm run build && sleep infinity"
    volumes:
      - frontend_dist:/app/dist

  nginx:
    container_name: nginx
    image: nginx:1.27-alpine
    depends_on:
      - backend
      - frontend_builder
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
      # نفس المسارات التي يقرأ منها nginx alias والـ settings في Django
      - staticfiles:/app/backend/staticfiles:ro
      - media:/app/backend/media:ro

volumes:
  pg_data:
  staticfiles:
  media:
  frontend_dist:
