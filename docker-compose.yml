services:
  db:
    image: postgres:16-alpine
    container_name: ibla_db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ibla_db}
      POSTGRES_USER: ${POSTGRES_USER:-ibla_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ibla_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: ibla_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "6379:6379"

  web:
    image: python:3.12-slim
    container_name: ibla_web
    restart: unless-stopped
    working_dir: /app
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-backend.settings.dev}
      PYTHONDONTWRITEBYTECODE: 1
      PYTHONUNBUFFERED: 1
    volumes:
      - ./:/app:cached
      - media_data:/app/media
      - static_data:/app/backend/staticfiles   # ← هنا التوحيد
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      bash -lc "
        pip install --upgrade pip &&
        pip install -r requirements.txt &&
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        python manage.py runserver 0.0.0.0:8000
      "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ibla_frontend_builder
    volumes:
      - frontend_build:/dist
    command: >
      sh -c "rm -rf /dist/* && cp -r /app/dist/* /dist/ && tail -f /dev/null"

  nginx:
    image: nginx:1.27-alpine
    container_name: ibla_nginx
    depends_on:
      - web
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_build:/usr/share/nginx/html:ro
      - media_data:/app/media:ro
      - static_data:/app/backend/staticfiles:ro   # ← وهنا أيضاً

volumes:
  postgres_data: {}
  redis_data: {}
  media_data: {}
  static_data: {}
  frontend_build: {}
