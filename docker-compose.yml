services:
  db:
    container_name: ibla_db
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    container_name: ibla_redis
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    # اسم الخدمة = web لأن nginx يـ proxy على http://web:8000
    container_name: ibla_web
    image: python:3.12-slim
    working_dir: /app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - ./:/app
      - static_data:/app/backend/staticfiles
      - media_data:/app/media
    expose:
      - "8000"
    command: >
      sh -c "
        pip install --no-cache-dir -r requirements.txt &&
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        gunicorn backend.wsgi:application --bind 0.0.0.0:8000 --workers 3
      "

  frontend_builder:
    container_name: ibla_frontend_builder
    image: node:20-alpine
    working_dir: /app
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - frontend_dist:/app/dist
    command: >
      sh -c "npm ci && npm run build && tail -f /dev/null"

  nginx:
    container_name: ibla_nginx
    image: nginx:1.27
    restart: unless-stopped
    depends_on:
      - web
      - frontend_builder
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
      - static_data:/app/backend/staticfiles:ro
      - media_data:/app/media:ro

volumes:
  pg_data:
  static_data:
  media_data:
  frontend_dist:
