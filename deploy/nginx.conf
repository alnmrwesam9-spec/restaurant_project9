# ========= Nginx =========
events {}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile on;
  server_tokens off;

  upstream django_upstream {
    server backend:8000;
  }

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 80;
    server_name _;

    # Frontend (Vite build) mounted at /usr/share/nginx/html
    root   /usr/share/nginx/html;
    index  index.html;

    # SPA assets & fallback
    location /assets/       { try_files $uri =404; }
    location = /favicon.ico { try_files /favicon.ico =404; }
    location /              { try_files $uri /index.html; }

    # API -> Django  (مهم: بدون شرطة مائلة نهائية حتى لا تُقصّ /api/)
    location /api/ {
      proxy_pass http://django_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        $connection_upgrade;
      client_max_body_size 20m;
    }

    # Shortcut to Django admin
    location /dj-admin/ {
      proxy_pass http://django_upstream/admin/;
    }

    # Static & Media (طابقنا المسارات مع مسار collectstatic الحقيقي)
    location /static/ {
      alias /app/backend/backend/staticfiles/;
      access_log off;
      expires 30d;
    }

    location /media/ {
      alias /app/backend/backend/media/;
      access_log off;
      expires 30d;
    }
  }
}
