worker_processes auto;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  sendfile      on;

  server {
    listen 80;

    # يقدّم الـ SPA (بناء Vite) من داخل الحاوية
    root /usr/share/nginx/html;
    index index.html;

    # تمرير كل استدعاءات الـ API كما هي إلى Django (بدون إزالة الـ /api)
    location /api/ {
      proxy_pass         http://web:8000;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # لوحة أدمن Django على /dj-admin/
    location = /dj-admin { return 301 /dj-admin/; }
    location ^~ /dj-admin/ {
      proxy_pass         http://web:8000/admin/;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ملفات الميديا
    location /media/ { alias /app/media/; }

    # static التي يجمعها Django (يجب أن تكون موجودة داخل web ومشتركة للقراءة فقط في nginx)
    location /static/ {
      alias /app/backend/staticfiles/;
      expires 30d;
      add_header Cache-Control "public";
    }

    # SPA fallback
    location / {
      try_files $uri /index.html;
    }
  }
}
